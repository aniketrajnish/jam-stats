<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>jam-stats</title>
  <link rel="icon" type="image/png" href="./logo.png">
  <meta
    name="description"
    content="load itch.io jam entries from a jam url, slug, or numeric jam id"
  >
  <meta name="jam-stats-api-base" content="">
  <style>
    :root {
      --accent: #fa5c5c;
      --accent-dark: #e14b4b;
      --accent-soft: #ffe8e8;
      --bg: #f4f4f0;
      --fg: #222222;
      --muted: #6b6b6b;
      --panel: #ffffff;
      --border: #d9d9d4;
      --shadow: 0 1px 0 rgba(0, 0, 0, 0.05), 0 10px 24px rgba(0, 0, 0, 0.08);
      --danger: #c23c3c;
      --maxw: 1180px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      background: var(--bg);
      color: var(--fg);
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input {
      font: inherit;
    }

    main {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 28px 24px 36px;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 0 0 24px;
      padding: 18px 20px;
      border-radius: 14px;
      background: linear-gradient(180deg, var(--accent), var(--accent-dark));
      color: #ffffff;
      box-shadow: var(--shadow);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .page-logo {
      width: 58px;
      height: 58px;
      border-radius: 12px;
      background: #ffffff;
      object-fit: cover;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.06);
    }

    .brand-copy h1 {
      margin: 0;
      font-size: 30px;
      letter-spacing: -0.02em;
    }

    .brand-copy p {
      margin: 4px 0 0;
      color: rgba(255, 255, 255, 0.88);
    }

    @media (max-width: 720px) {
      .topbar {
        padding: 16px;
      }

      .brand {
        align-items: flex-start;
      }
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      box-shadow: var(--shadow);
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input[type="text"] {
      flex: 1 1 360px;
      min-width: 240px;
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      color: var(--fg);
      box-shadow: inset 0 1px 1px rgba(0, 0, 0, 0.04);
    }

    button {
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 12px;
      padding: 12px 16px;
      background: var(--accent);
      color: #ffffff;
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    button.ghost {
      background: #f7f7f3;
      color: var(--fg);
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .status {
      min-height: 24px;
      margin-top: 12px;
      color: var(--muted);
    }

    .status.error {
      color: var(--danger);
    }

    .status.success {
      color: var(--accent);
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      flex-wrap: wrap;
      margin: 24px 0 12px;
    }

    .search-wrap {
      flex: 1 1 320px;
    }

    .summary {
      color: var(--muted);
      white-space: nowrap;
    }

    .table-panel {
      padding: 0;
      overflow: hidden;
    }

    .table-wrap {
      overflow: auto;
    }

    table {
      width: 100%;
      min-width: 1040px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 14px 16px;
      vertical-align: top;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    thead tr {
      background: #f8e3e3;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #f8e3e3;
      backdrop-filter: blur(8px);
    }

    th button.sort {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0;
      margin: 0;
      border: 0;
      background: none;
      color: inherit;
      box-shadow: none;
    }

    th button.sort.active {
      color: var(--accent-dark);
    }

    .sort-indicator {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      color: currentColor;
      opacity: 0.6;
    }

    th button.sort.active .sort-indicator {
      opacity: 1;
    }

    .sort-indicator svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    tbody tr:hover {
      background: #fff5f5;
    }

    .game-link {
      font-weight: 700;
    }

    .game-link:hover,
    .subtle a:hover,
    .contrib-list a:hover {
      text-decoration: underline;
    }

    .subtle {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 14px;
    }

    .contrib-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .platforms {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .platform-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #f7f7f3;
      color: #555555;
      box-shadow: none;
      transition: background-color 120ms ease, border-color 120ms ease, color 120ms ease;
    }

    .platform-icon:hover {
      border-color: var(--accent-dark);
      color: var(--accent-dark);
    }

    .platform-icon.active {
      border-color: var(--accent-dark);
      background: var(--accent);
      color: #ffffff;
    }

    .platform-icon svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .empty {
      padding: 36px 24px;
      color: var(--muted);
    }

    code {
      padding: 1px 6px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--panel);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <main>
    <header class="topbar">
      <div class="brand">
        <img class="page-logo" src="./logo.png" alt="jam-stats logo">
        <div class="brand-copy">
          <h1>jam-stats</h1>
        </div>
      </div>
    </header>

    <section class="panel">
      <label for="jam-input">jam url / slug / id</label>
      <div class="controls">
        <input
          id="jam-input"
          type="text"
          placeholder="https://itch.io/jam/brackeys-15 or brackeys-15 or 402922"
        >
        <button id="load-button" type="button">load entries</button>
        <button id="example-button" class="ghost" type="button">use example</button>
      </div>

      <div id="status" class="status">ready</div>
    </section>

    <section class="toolbar">
      <div class="search-wrap">
        <label for="search-input">search game / contributor</label>
        <input id="search-input" type="text" placeholder="game title or contributor name" disabled>
      </div>
      <div id="summary" class="summary">0 entries</div>
    </section>

    <section class="panel table-panel">
      <div class="table-wrap">
        <table aria-describedby="summary">
          <thead>
            <tr>
              <th><button class="sort" data-sort="gameName" type="button" title="canonical itch.io game title from jam_games[].game.title">game name <span class="sort-indicator" aria-hidden="true"></span></button></th>
              <th><button class="sort" data-sort="contributors" type="button" title="uses jam_games[].contributors when present otherwise falls back to the primary uploader">contributors <span class="sort-indicator" aria-hidden="true"></span></button></th>
              <th><button class="sort active" data-sort="popularity" type="button" title="uses itch.io native jam_games order from entries.json where 1 is most popular">popularity <span class="sort-indicator" aria-hidden="true"></span></button></th>
              <th><button class="sort" data-sort="totalRating" type="button" title="raw rating_count from entries.json">total rating <span class="sort-indicator" aria-hidden="true"></span></button></th>
              <th><button class="sort" data-sort="coolness" type="button" title="raw coolness from entries.json calculated by itch as max votes_given minus disqualified_votes across contributors">coolness <span class="sort-indicator" aria-hidden="true"></span></button></th>
              <th><button class="sort" data-sort="karma" type="button" title="calculated as log 1 plus coolness minus log 1 plus rating_count divided by log 5">karma <span class="sort-indicator" aria-hidden="true"></span></button></th>
              <th><button class="sort" data-sort="platforms" type="button" title="from jam_games[].game.platforms in entries.json">platforms <span class="sort-indicator" aria-hidden="true"></span></button></th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr>
              <td class="empty" colspan="7">load a jam to populate the table</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script defer src="./app.js"></script>
</body>
</html>
